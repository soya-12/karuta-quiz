let current;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function nextQuestion() {
  answered = false;                 // ← 追加
  document.getElementById("result").textContent = "";
  document.getElementById("meaning").style.display = "none";

  current = poems[Math.floor(Math.random() * poems.length)];
  document.getElementById("kami").textContent = current.kami;

  const choices = shuffle([
    current.shimo,
    ...shuffle(poems.filter(p => p !== current))
      .slice(0, 3)
      .map(p => p.shimo)
  ]);

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = choice;
    btn.onclick = () => answer(choice);
    choicesDiv.appendChild(btn);
  });
}

function answer(choice) {
  // すでに回答済みなら何もしない
  if (answered) return;

  answered = true;   // ← ここで「回答済み」にする

  const result = document.getElementById("result");
  const meaning = document.getElementById("meaning");

  totalCount++;

  if (choice === current.shimo) {
    correctCount++;
    result.textContent = "✅ 正解！";
  } else {
    result.textContent = "❌ 不正解";
  }

  const percent = ((correctCount / totalCount) * 100).toFixed(1);
  result.textContent += `\n正答率：${correctCount} / ${totalCount}（${percent}％）`;

  meaning.textContent = "【意味】" + current.meaning;
  meaning.style.display = "block";
}
nextQuestion();
</script>
